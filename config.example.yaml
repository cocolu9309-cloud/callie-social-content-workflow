# Callie Social Content Workflow — 配置文件模板
# 复制此文件为 config.yaml，并填入你的实际配置

# SiliconFlow API Key（用于AI图像生成）
# 申请地址: https://www.siliconflow.cn/
siliconflow_api_key: "YOUR_API_KEY_HERE"

# 产品信息（可在此预先填入，也可在运行时提供）
product:
  name: ""
  link: ""
  category: ""
  material: ""
  occasions: ""
  target_audience: ""

# 默认目标平台
default_platform: "Instagram"

# 输出目录
output_dir: "./output"

# 视频帧提取时间点（秒）
frame_timestamps:
  - 0
  - 3
  - 8
  - 15
  - 22
  - 30

# 关键帧生成数量
num_keyframes: 6

# 图像生成尺寸（9:16竖版）
image_size: "1024x1792"